name: Build ShipFix

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Download VS Core API
        run: |
          mkdir -p libs
          curl -L "https://maven.valkyrienskies.org/org/valkyrienskies/vs-core/vs-core-api/0.0.3-beta.6/vs-core-api-0.0.3-beta.6.jar" -o libs/vs-core-api.jar || true
          curl -L "https://maven.valkyrienskies.org/org/valkyrienskies/vs-core/vs-core/0.0.3-beta.6/vs-core-0.0.3-beta.6.jar" -o libs/vs-core.jar || true

      - name: Build
        run: gradle build

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: shipfix-jar
          path: build/libs/*.jar
