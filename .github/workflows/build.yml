name: Build ShipFix

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Download VS Core API
        run: |
          mkdir -p libs
          mvn dependency:get \
            -Dartifact=org.valkyrienskies:vs-core-api:0.0.3-beta.6 \
            -DremoteRepositories=vs::::https://maven.valkyrienskies.org \
            -Ddest=libs/ || true
          find ~/.m2 -name "vs-core-api*.jar" -exec cp {} libs/vs-core-api.jar \; 2>/dev/null || true
          find ~/.m2 -name "valkyrienskies-core*.jar" -exec cp {} libs/vs-core.jar \; 2>/dev/null || true
          ls -la libs/

      - name: Build
        run: gradle build

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: shipfix-jar
          path: build/libs/*.jar
